<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mystery Search</title>
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon" />
    <link rel="preload" href="/assets/background_homepage.png" as="image" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-home">
    <div class="shell home-shell">
      <header class="brand home-brand">
        <h1 class="home-logo">
          <img
            src="/assets/logo.svg"
            alt="Mystery Search — Explore the unknown"
            width="550"
            height="250"
          />
        </h1>
      </header>

      <div class="home-panel-wrap">
      <div class="home-panel">
        <form class="search-form home-search-form" id="home-search" action="search.html" method="get">
          <input
            type="search"
            name="q"
            id="q"
            placeholder="Search for clues…"
            autocomplete="off"
            required
          />
          <button type="submit">Search</button>
        </form>

        <p class="section-title">Try an example</p>
        <div class="chips" id="example-chips"></div>

        <details class="advanced" open>
          <summary>Advanced search</summary>
          <div class="advanced-grid">
            <label>
              Country
              <select name="country" id="adv-country" class="filter-country">
                <option value="">Any</option>
              </select>
            </label>
            <label>
              Category tag
              <select name="category" id="adv-category">
                <option value="">Any</option>
              </select>
            </label>
            <label>
              Case status
              <select name="case_status" id="adv-case-status">
                <option value="">Any</option>
              </select>
            </label>
          </div>
        </details>
      </div>
      </div>
    </div>
    <script src="/js/config.js"></script>
    <script src="/js/search.js"></script>
    <script>
      const form = document.getElementById("home-search");
      const chipsEl = document.getElementById("example-chips");
      const catSelect = document.getElementById("adv-category");
      const countrySelect = document.getElementById("adv-country");
      const caseStatusSelect = document.getElementById("adv-case-status");

      populateCountrySelect(countrySelect);
      populateCaseStatusSelect(caseStatusSelect);

      EXAMPLE_QUERIES.forEach((q) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip";
        b.textContent = q;
        b.addEventListener("click", () => goToSearch(q));
        chipsEl.appendChild(b);
      });

      BROWSE_CATEGORIES.forEach((c) => {
        const opt = document.createElement("option");
        opt.value = c.value;
        opt.textContent = c.label;
        catSelect.appendChild(opt);
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const q = document.getElementById("q").value;
        const country = countrySelect.value;
        const category = document.getElementById("adv-category").value;
        const caseStatus = caseStatusSelect.value;
        goToSearch(q, {
          country: country || undefined,
          category: category || undefined,
          case_status: caseStatus || undefined,
        });
      });
    </script>
  </body>
</html>
